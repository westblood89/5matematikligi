<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matematik Ligi Yönetim Sistemi — 5. Sınıflar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .qualified { background-color: #dcfce7 !important; }
    .flash { animation: flash 1.2s ease-out 1; }
    @keyframes flash { from { background:#fef9c3; } to { background:transparent; } }
    .btn-disabled { opacity:.6; cursor:not-allowed; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
  <div class="container mx-auto px-4 py-6">
    <!-- Header -->
    <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
      <div class="flex items-center justify-center mb-4">
        <div class="text-4xl mr-4">🎒</div>
        <div class="text-center">
          <h1 class="text-3xl font-bold text-indigo-800 mb-2">🏆 Matematik Ligi</h1>
          <div class="text-center">
            <span class="text-gray-600 font-medium text-xl">5. Sınıflar Grup Aşaması</span>
          </div>
        </div>
        <div class="text-4xl ml-4">📚</div>
      </div>
      <div class="flex justify-center items-center space-x-4 text-2xl">
        <span>✏️</span><span>📝</span><span>🧮</span><span>📐</span><span>📏</span>
        <span>🔢</span><span>➕</span><span>➖</span><span>✖️</span><span>➗</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="bg-white rounded-lg shadow-lg mb-6">
      <div class="flex flex-wrap border-b">
        <button onclick="showTab('standings', this)" class="tab-btn px-4 py-3 font-medium text-indigo-600 border-b-2 border-indigo-600">
          📊 Puan Durumu
        </button>
        <button onclick="showTab('fixtures', this)" class="tab-btn px-4 py-3 font-medium text-gray-500 hover:text-indigo-600">
          📅 Fikstür
        </button>
        <button onclick="showTab('dataentry', this)" class="tab-btn px-4 py-3 font-medium text-gray-500 hover:text-indigo-600">
          📥 Veri Girişi
        </button>
      </div>
    </div>

    <!-- Standings -->
    <div id="standings" class="tab-content active">
      <div class="bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Puan Durumu</h2>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Grup Seç:</label>
          <select id="standingsGroupSelect" onchange="showStandings()" class="border border-gray-300 rounded-lg px-3 py-2">
            <option value="">Grup seçin...</option>
          </select>
        </div>
        <div id="standingsContent"></div>
      </div>
    </div>

    <!-- Fixtures -->
    <div id="fixtures" class="tab-content">
      <div class="bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Fikstür ve Sonuçlar</h2>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-2">Grup Seç:</label>
          <select id="fixtureGroupSelect" onchange="showFixtures()" class="border border-gray-300 rounded-lg px-3 py-2">
            <option value="">Grup seçin...</option>
          </select>
        </div>

        <!-- Backup buttons -->
        <div class="mb-4 flex gap-2">
          <button onclick="downloadBackup()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-sm">💾 Yedeği İndir</button>
          <label class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg text-sm cursor-pointer">
            📤 Yedekten Yükle
            <input type="file" id="restoreInput" accept="application/json" class="hidden" onchange="restoreFromFile(event)" />
          </label>
        </div>

        <div id="fixtureContent"></div>
      </div>
    </div>

    <!-- Data Entry -->
    <div id="dataentry" class="tab-content">
      <div class="bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Veri Girişi (Toplu Yapıştır)</h2>

        <div class="grid md:grid-cols-3 gap-4 mb-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Grup Seç:</label>
            <select id="dataGroupSelect" class="border border-gray-300 rounded-lg px-3 py-2">
              <option value="">Grup seçin...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Hafta:</label>
            <select id="dataWeekSelect" class="border border-gray-300 rounded-lg px-3 py-2">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
            </select>
          </div>
          <div class="flex items-end gap-2">
            <button id="btnPreview" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg"
                    onclick="previewFromPaste()">Eşleştir & Önizle</button>
            <button id="btnApplyTop" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg btn-disabled" disabled
                    onclick="applyFromTop()">Sonuçları Uygula</button>
          </div>
        </div>

        <div class="mb-2 text-sm text-gray-600">
          <p>Biçim örnekleri: <code>Ad<TAB>12</code> · <code>Ad,12</code> · <code>Ad; 12</code> · <code>Ad 12</code></p>
          <p>Listede adı <u>yoksa</u> o öğrenci bu hafta <b>0</b> alır.</p>
        </div>

        <textarea id="pasteInput" rows="10" class="w-full border border-gray-300 rounded-lg p-3 font-mono text-sm"
          placeholder="ÖĞRENCİ ADI[TAB veya , ; boşluk]PUAN
ALİ OĞUZ 11
NİKAN KAYA 12
ADA USTA 10"></textarea>

        <div id="previewArea" class="mt-3"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'mathLeagueData5';
    let leagueData = { groups: {}, fixtures: {}, results: {}, matchIndex: {} };

    function createDownloadableBackup() {
      const dataStr = JSON.stringify(leagueData, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      let a = document.getElementById('downloadBackup');
      if (!a) { a = document.createElement('a'); a.id = 'downloadBackup'; a.style.display = 'none'; document.body.appendChild(a); }
      a.href = URL.createObjectURL(dataBlob);
      a.download = `matematik_ligi_5sinif_yedek_${new Date().toISOString().slice(0,10)}.json`;
    }
    function downloadBackup(){ document.getElementById('downloadBackup')?.click(); }
    function restoreFromFile(ev){
      const f = ev.target.files?.[0]; if(!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const obj = JSON.parse(reader.result);
          if (obj && obj.groups && obj.fixtures && obj.results) {
            leagueData = { matchIndex:{}, ...obj }; if (!leagueData.matchIndex) leagueData.matchIndex = {};
            Object.keys(leagueData.fixtures||{}).forEach(g => buildMatchIndex(g));
            saveData();
            populateGroupSelects(); showFixtures(); showStandings();
            alert('✅ Yedekten geri yüklendi');
          }
        } catch { alert('❌ Yedek okunamadı.'); }
        ev.target.value = '';
      };
      reader.readAsText(f);
    }

    function saveData() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(leagueData)); createDownloadableBackup(); }
      catch(e){ console.error('Kaydetme hatası:', e); }
    }
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try { leagueData = { matchIndex:{}, ...JSON.parse(saved) }; if (!leagueData.matchIndex) leagueData.matchIndex = {}; }
        catch {}
      }
    }

    function initializeDefaultGroups() {
      const groupA = ['ALİ OĞUZ','NİKAN KAYA','ADA USTA','EGE SARI','PERİSU MURATHAN','ALP EFE IŞIK','HÜSEYİN RÜZGAR SAĞLAM','AHMET ASAF ÖZEN'];
      const groupB = ['BARTU UÇAR','ÖMER BARAN AYTEMÜR','ALARA DERİN ÖZYER','ELİF YILMAZ','POYRAZ AHMED AYDINALP','ALYA EKMEN','KUTAY ÇOLAK','ALYA ÖZPİ'];
      const groupC = ['ÇINAR BERKAY KILINÇ','RÜZGAR KIRALİ','ALİ ATİLA','EMİR ÜNAL','SEDEF GÜNEŞLİ','AYAZ ALİ YILDIZ','KUZEY KURTULDU','ARAS ARKAN'];
      const groupD = ['DEMİR TÜLÜ','YUSUF YANKI EKİZ','ALP KORALAY','EMRE ÖNEY','SERHAT YAMAN AĞIRMAN','AYŞE ADA YEŞİLYURT','MAHMUTALİ AYDIN','ASİL TURAN'];
      const groupE = ['DERİN ASEL ASLAN','ZEHRA DEFNE AKBEY','ALP METE KURU','FATMA ERVA TAŞDEMİR','TUNA DEMİRER','BİLGE NAZ ÖZCAN','MELİS COŞKUNER','BEREN BULCA'];
      const groupF = ['DOĞA ATEŞ','ZEYNEP ALYA EROL','ALP ÖZ','İPEK NAZLI DOLU','YİĞİT ALİ KOÇ','BÜRÇE TUBA KURT','MİHRİMAH ELA YILDIRIM','BEYZA BETÜL HORUZ'];
      const groupG = ['DURU İŞERİ','ZEYNEP KIZILKAYA','ARYA SAĞLIK','KEREM IŞIK','YİĞİT ARDA MART','CAN AYTAK','MİRA DAL','CAN AKTAŞ'];
      const groupH = ['ECE ÜSTÜNDAĞ','ZEYNEP VURUCU','AYAZ SANLI','KEREM TUNÇYÜREK','ZEYNEP BİLİR','CEM ÇINAR DUMAN','MİRA ŞAHİN','DAĞHAN EROL ZİNDAR'];
      const groupI = ['ELA ALDEMİR','BEYZA KARTAL','KÜRŞAT GÖKDENİZ BEKTAŞ','DEFNE ÇİM','NİL TABAK','DEFNE AYTAK','KEREM ÖZTÜRK','AHMET MUTAY ERDEM'];
      const groupJ = ['EREN ÖZEL','ÇAĞAN AKÇA','MELİSA ESMER','DENİZ ÇİM','NİSAN ÖZLÜK','DEFNE TINAZ','MEHMET ALİ ÇEMBERCİ','BEREN NEZİROĞULULARI'];
      const groupK = ['İNAN ALDEMİR','DEFNE TOPAL','MERT ÖZEL','ELA EMİROĞLU','SELİS TAHA','DENİZ PINDIKOĞLU','MERYEM ŞEN','DEFNE ERÇEL'];
      const groupL = ['KAAN ÇALIŞKAN','DEMİR ALİ KAYA','MUSTAFA KADİR ARSLANOĞLU','ELİF DULUNDU','ŞEVVAL ÖZTÜRK','DERİN HOBAT','MUSTAFA ALTUĞ YAĞIZ','DEFNE ZENAN ÖZEN'];
      const groupM = ['LİNA ÖZTAN','DEVRİM ÖZGER','MUSTAFA YAĞIZ AVCI','ELİF KILINÇ','TANEM LÂL KAVAKLI','EREN TURANBARANOĞLU','SERRA SIRDAŞ','ATA İRGİ','DORA ILGIN GÜRSOY'];
      const groupN = ['MELİH BURAK YAĞAR','DORUK ÇETİN','NİSA ÖZVARDAR','ELİS DEMİR','YUSUF EREN','GÜNEY DÜZGÜN','ZEYNEP ZÜLEYHA GEYİK','ATA YILMAZ ŞAHİN','EMİR TURANBARANOĞLU'];
      const groupO = ['MERCAN GÖZÜKÜÇÜK','DORUK DUYMAÇ','ÖMER SADETTİN KELEŞ','GÖKÇE TABAK','HELEN SEREZ','ZEYNEP HEVİN BİLGE','AYŞE BEREN ULU','KEREM ÜNAL','YAĞMUR SEZER'];

      const add = (key, arr) => {
        if (!leagueData.groups[key]) { leagueData.groups[key] = arr.slice(); }
        if (!leagueData.fixtures[key]) { leagueData.fixtures[key] = generateGroupFixtures(key); }
        if (!leagueData.results[key]) { leagueData.results[key] = {}; }
      };

      add('A Grubu', groupA); add('B Grubu', groupB); add('C Grubu', groupC); add('D Grubu', groupD);
      add('E Grubu', groupE); add('F Grubu', groupF); add('G Grubu', groupG); add('H Grubu', groupH);
      add('I Grubu', groupI); add('J Grubu', groupJ); add('K Grubu', groupK); add('L Grubu', groupL);
      add('M Grubu', groupM); add('N Grubu', groupN); add('O Grubu', groupO);
    }

    function populateGroupSelects() {
      const standingsSelect = document.getElementById('standingsGroupSelect');
      const fixtureSelect = document.getElementById('fixtureGroupSelect');
      const dataGroupSelect = document.getElementById('dataGroupSelect');
      if (standingsSelect) standingsSelect.innerHTML = '<option value="">Grup seçin...</option>';
      if (fixtureSelect) fixtureSelect.innerHTML = '<option value="">Grup seçin...</option>';
      if (dataGroupSelect) dataGroupSelect.innerHTML = '<option value="">Grup seçin...</option>';
      Object.keys(leagueData.groups).forEach(groupName => {
        const o1 = document.createElement('option'); o1.value = groupName; o1.textContent = groupName; standingsSelect?.appendChild(o1);
        const o2 = document.createElement('option'); o2.value = groupName; o2.textContent = groupName; fixtureSelect?.appendChild(o2);
        const o3 = document.createElement('option'); o3.value = groupName; o3.textContent = groupName; dataGroupSelect?.appendChild(o3);
      });
    }

    function generateGroupFixtures(groupName) {
      const teams = (leagueData.groups[groupName]||[]).filter(t => t && t.trim() !== '');
      const n = teams.length;
      if (n < 2) return [];

      const arr = teams.slice();
      if (n % 2 === 1) arr.push('BYE');
      const m = arr.length;
      const half = m / 2;
      const weeks = m - 1;
      const fixtures = [];
      for (let w = 0; w < weeks; w++) {
        for (let i = 0; i < half; i++) {
          const home = arr[i], away = arr[m-1-i];
          if (home !== 'BYE' && away !== 'BYE') {
            const id = `${groupName}_${w}_${i}`;
            fixtures.push({ id, round: w+1, homeTeam: home, awayTeam: away });
            leagueData.matchIndex[id] = { group: groupName, week: w+1, home: home, away: away };
          }
        }
        const fixed = arr[0];
        const rest = arr.slice(1);
        rest.unshift(rest.pop());
        const rotated = [fixed, ...rest];
        for (let i = 0; i < m; i++) arr[i] = rotated[i];
      }
      return fixtures;
    }
    function ensureFixturesForGroup(groupName){
      if (!leagueData.fixtures[groupName] || !leagueData.fixtures[groupName].length) {
        leagueData.fixtures[groupName] = generateGroupFixtures(groupName);
        saveData();
      } else {
        buildMatchIndex(groupName);
      }
    }
    function buildMatchIndex(groupName){
      const list = leagueData.fixtures[groupName]||[];
      for (const f of list){
        leagueData.matchIndex[f.id] = { group: groupName, week: f.round, home: f.homeTeam, away: f.awayTeam };
      }
    }

    function showTab(tabName, btn) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('text-indigo-600','border-b-2','border-indigo-600'); b.classList.add('text-gray-500'); });
      if (btn) { btn.classList.remove('text-gray-500'); btn.classList.add('text-indigo-600','border-b-2','border-indigo-600'); }
      if (tabName === 'standings') showStandings();
      if (tabName === 'fixtures') showFixtures();
    }

    function calculateStandings(groupName, teams) {
      const standings = teams.map(t => ({ name: t, played:0, won:0, drawn:0, lost:0, goalsFor:0, goalsAgainst:0, goalDifference:0, points:0 }));
      const idxByName = Object.fromEntries(standings.map((s,i)=>[s.name,i]));
      const groupResults = leagueData.results[groupName] || {};
      Object.values(groupResults).forEach(res => {
        if (res.homeScore === '' || res.awayScore === '' || res.homeScore == null || res.awayScore == null) return;
        const hi = idxByName[res.homeTeam], ai = idxByName[res.awayTeam];
        if (hi === undefined || ai === undefined) return;
        const home = standings[hi], away = standings[ai];
        const hs = parseInt(res.homeScore) || 0, as = parseInt(res.awayScore) || 0;
        home.played++; away.played++;
        home.goalsFor += hs; home.goalsAgainst += as;
        away.goalsFor += as; away.goalsAgainst += hs;
        if (hs > as) { home.won++; home.points += 3; away.lost++; }
        else if (hs < as) { away.won++; away.points += 3; home.lost++; }
        else { home.drawn++; away.drawn++; home.points++; away.points++; }
        home.goalDifference = home.goalsFor - home.goalsAgainst;
        away.goalDifference = away.goalsFor - away.goalsAgainst;
      });
      standings.sort((a,b) => (b.points - a.points) || (b.goalDifference - a.goalDifference) || (b.goalsFor - a.goalsFor));
      return standings;
    }

    function showStandings() {
      const groupName = document.getElementById('standingsGroupSelect').value;
      const content = document.getElementById('standingsContent');
      if (!groupName) { content.innerHTML = '<p class="text-gray-500">Lütfen bir grup seçin.</p>'; return; }
      ensureFixturesForGroup(groupName);
      const teams = leagueData.groups[groupName] || [];
      const standings = calculateStandings(groupName, teams);
      let html = `
        <div class="overflow-x-auto">
          <table class="w-full border-collapse">
            <thead>
              <tr class="bg-indigo-600 text-white">
                <th class="border border-gray-300 px-2 py-2 text-center">Sıra</th>
                <th class="border border-gray-300 px-3 py-2 text-left">Öğrenci</th>
                <th class="border border-gray-300 px-2 py-2 text-center">O</th>
                <th class="border border-gray-300 px-2 py-2 text-center">G</th>
                <th class="border border-gray-300 px-2 py-2 text-center">B</th>
                <th class="border border-gray-300 px-2 py-2 text-center">M</th>
                <th class="border border-gray-300 px-2 py-2 text-center">P</th>
              </tr>
            </thead>
            <tbody>`;
      standings.forEach((t, i) => {
        const q = i < 4 ? 'qualified' : '';
        html += `
          <tr class="${q}">
            <td class="border border-gray-300 px-2 py-2 text-center font-medium">${i+1}</td>
            <td class="border border-gray-300 px-3 py-2 font-medium">${t.name}</td>
            <td class="border border-gray-300 px-2 py-2 text-center">${t.played}</td>
            <td class="border border-gray-300 px-2 py-2 text-center">${t.won}</td>
            <td class="border border-gray-300 px-2 py-2 text-center">${t.drawn}</td>
            <td class="border border-gray-300 px-2 py-2 text-center">${t.lost}</td>
            <td class="border border-gray-300 px-2 py-2 text-center font-bold">${t.points}</td>
          </tr>`;
      });
      html += `</tbody></table></div>
        <div class="mt-4 text-sm text-gray-600">
          <div class="flex items-center mb-2">
            <div class="w-4 h-4 bg-green-200 border border-green-300 mr-2"></div>
            <span>Bir sonraki tura çıkan öğrenciler (İlk 4)</span>
          </div>
        </div>`;
      content.innerHTML = html;
    }

    function showFixtures() {
      const groupName = document.getElementById('fixtureGroupSelect').value;
      const content = document.getElementById('fixtureContent');
      if (!groupName) { content.innerHTML = '<p class="text-gray-500">Lütfen bir grup seçin.</p>'; return; }
      ensureFixturesForGroup(groupName);
      const fixtures = leagueData.fixtures[groupName] || [];
      if (!fixtures.length) { content.innerHTML = '<p class="text-gray-500">Bu grup için henüz fikstür oluşturulmamış.</p>'; return; }

      const rounds = {};
      fixtures.forEach(f => { (rounds[f.round] ??= []).push(f); });

      let html = '<div class="space-y-4">';
      Object.keys(rounds).sort((a,b)=>a-b).forEach(round => {
        html += `<div id="week_${round}" class="border border-gray-200 rounded-lg p-4">
          <h3 class="text-lg font-semibold mb-3 text-gray-800">${round}. Hafta</h3>
          <div class="space-y-2">`;
        rounds[round].forEach(fix => {
          const res = leagueData.results[groupName]?.[fix.id];
          const homeVal = res?.homeScore ?? '';
          const awayVal = res?.awayScore ?? '';
          html += `
            <div class="flex items-center justify-center bg-gray-50 p-3 rounded space-x-3">
              <span class="font-medium flex-1 text-right">${fix.homeTeam}</span>
              <input type="number" min="0" max="20" placeholder=""
                     value="${homeVal}" class="w-16 px-2 py-1 border border-gray-300 rounded text-center"
                     id="home_${fix.id}" onchange="saveResult('${groupName}','${fix.id}')">
              <span class="text-gray-500">-</span>
              <input type="number" min="0" max="20" placeholder=""
                     value="${awayVal}" class="w-16 px-2 py-1 border border-gray-300 rounded text-center"
                     id="away_${fix.id}" onchange="saveResult('${groupName}','${fix.id}')">
              <span class="font-medium flex-1 text-left">${fix.awayTeam}</span>
            </div>`;
        });
        html += `</div></div>`;
      });
      html += '</div>';
      content.innerHTML = html;
    }

    function saveResult(groupName, fixtureId) {
      const homeEl = document.getElementById(`home_${fixtureId}`);
      const awayEl = document.getElementById(`away_${fixtureId}`);
      const homeRaw = homeEl?.value ?? '';
      const awayRaw = awayEl?.value ?? '';
      if (homeRaw === '' || awayRaw === '') return;
      const home = parseInt(homeRaw, 10);
      const away = parseInt(awayRaw, 10);
      if (Number.isNaN(home) || Number.isNaN(away) || home < 0 || away < 0) return;
      const fix = (leagueData.fixtures[groupName]||[]).find(f => f.id === fixtureId);
      if (!fix) return;
      if (!leagueData.results[groupName]) leagueData.results[groupName] = {};
      leagueData.results[groupName][fixtureId] = {
        homeTeam: fix.homeTeam, awayTeam: fix.awayTeam,
        homeScore: home, awayScore: away
      };
      saveData();
      showFixtures();
      const sel = document.getElementById('standingsGroupSelect');
      if (sel?.value === groupName) showStandings();
    }

    function normName(s){
      if (!s) return '';
      return s
        .replace(/\u00A0/g, ' ')
        .normalize('NFKC')
        .trim()
        .replace(/\s+/g,' ')
        .toLocaleUpperCase('tr-TR');
    }

    function parsePasted(text){
      const map = {};
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      for (const raw of lines){
        const line = raw.replace(/\u00A0/g,' ').replace(/\s+/g,' ').trim();
        let m = line.match(/^(.*?)[\t,;:|-]\s*([0-9]+)$/);
        if (!m) m = line.match(/^(.*)\s+([0-9]+)$/);
        if (m){
          const name = normName(m[1]);
          const score = parseInt(m[2],10);
          if (!isNaN(score) && name) map[name] = score;
        }
      }
      return map;
    }

    function previewFromPaste(){
      const g = document.getElementById('dataGroupSelect').value;
      const week = parseInt(document.getElementById('dataWeekSelect').value,10);
      const txt = document.getElementById('pasteInput').value;
      const area = document.getElementById('previewArea');

      if (!g){ area.innerHTML = '<p class="text-red-600">Lütfen grup seçin.</p>'; return; }
      ensureFixturesForGroup(g);

      const fixtures = leagueData.fixtures[g] || [];
      const thisWeek = fixtures.filter(f => f.round === week);
      if (!thisWeek.length){ area.innerHTML = '<p class="text-red-600">Bu grup için bu hafta yok.</p>'; return; }

      const map = parsePasted(txt);
      const groupMembers = (leagueData.groups[g]||[]).map(normName);
      const unknown = Object.keys(map).filter(n => !groupMembers.includes(n));

      let html = '';
      html += `<div class="mb-3 text-sm text-gray-700">Eşleşen skorlar <b>Hafta ${week}</b> için hazırlanıyor. Listede olmayan öğrenciler otomatik <b>0</b> alacak.</div>`;
      if (unknown.length){
        html += `<div class="mb-3 p-3 bg-yellow-50 border border-yellow-200 rounded text-sm">
          Bu isimler grupta bulunamadı ve yok sayılacak: <b>${unknown.join(', ')}</b>
        </div>`;
      }
      html += `<div class="overflow-x-auto"><table class="w-full border-collapse">
        <thead><tr class="bg-gray-100">
          <th class="border px-2 py-1 text-left">Ev Sahibi</th>
          <th class="border px-2 py-1 w-20">Skor</th>
          <th class="border px-2 py-1 w-6"></th>
          <th class="border px-2 py-1 text-left">Deplasman</th>
          <th class="border px-2 py-1 w-20">Skor</th>
        </tr></thead><tbody>`;

      const rows = thisWeek.map(m=>{
        const hs = map[normName(m.homeTeam)] ?? 0;
        const as = map[normName(m.awayTeam)] ?? 0;
        return `<tr>
          <td class="border px-2 py-1">${m.homeTeam}</td>
          <td class="border px-2 py-1 text-center">${hs}</td>
          <td class="border px-2 py-1 text-center">-</td>
          <td class="border px-2 py-1">${m.awayTeam}</td>
          <td class="border px-2 py-1 text-center">${as}</td>
        </tr>`;
      }).join('');

      html += rows + `</tbody></table></div>`;

      window.__previewData5 = { group:g, week, map };
      const btn = document.getElementById('btnApplyTop');
      if (btn) { btn.disabled = false; btn.classList.remove('btn-disabled'); }
      area.innerHTML = html + `<div class="mt-3 text-xs text-gray-500">Önizleme hazır. Yukarıdaki <b>Sonuçları Uygula</b> düğmesi aktif.</div>`;
    }

    function applyFromTop(){
      const pd = window.__previewData5;
      if (!pd) { alert('Önce Eşleştir & Önizle yapın.'); return; }
      applyPreview(pd.group, pd.week);
    }

    function applyPreview(groupName, week){
      const pd = window.__previewData5;
      if (!pd || pd.group !== groupName || pd.week !== week) return;
      ensureFixturesForGroup(groupName);
      const thisWeek = (leagueData.fixtures[groupName]||[]).filter(f => f.round === week);
      if (!thisWeek.length) return;

      let updated = 0;
      for (const m of thisWeek){
        const hs = pd.map[normName(m.homeTeam)] ?? 0;
        const as = pd.map[normName(m.awayTeam)] ?? 0;
        if (!leagueData.results[groupName]) leagueData.results[groupName] = {};
        leagueData.results[groupName][m.id] = {
          homeTeam: m.homeTeam, awayTeam: m.awayTeam,
          homeScore: hs, awayScore: as
        };
        leagueData.matchIndex[m.id] = { group: groupName, week: week, home: m.homeTeam, away: m.awayTeam };
        updated++;
      }
      saveData();

      const fixtureSelect = document.getElementById('fixtureGroupSelect');
      if (fixtureSelect) fixtureSelect.value = groupName;
      showFixtures();
      const target = document.getElementById('week_' + week);
      if (target) { target.classList.add('flash'); target.scrollIntoView({behavior:'smooth', block:'start'}); setTimeout(()=>target.classList.remove('flash'),1200); }

      if (document.getElementById('standingsGroupSelect').value === groupName) showStandings();

      const area = document.getElementById('previewArea');
      area.innerHTML = '<div class="p-3 rounded bg-emerald-50 border border-emerald-200 text-emerald-800">✅ ' + updated + ' maç güncellendi. Fikstür (Hafta ' + week + ') ve Puan Durumu yenilendi.</div>';
      const btn = document.getElementById('btnApplyTop');
      if (btn) { btn.disabled = true; btn.classList.add('btn-disabled'); }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      initializeDefaultGroups();
      Object.keys(leagueData.fixtures||{}).forEach(g => buildMatchIndex(g));
      saveData();
      populateGroupSelects();
      createDownloadableBackup();
      const sg = document.getElementById('standingsGroupSelect');
      if (sg && sg.options.length > 1) { sg.selectedIndex = 1; showStandings(); }
    });
  </script>

  <a id="downloadBackup" style="display:none"></a>
</body>
</html>
